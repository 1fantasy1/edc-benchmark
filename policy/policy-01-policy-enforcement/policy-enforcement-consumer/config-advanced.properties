# Alternative test configurations (uncomment one to test different levels):
# edc.mock.dataProtectionLevel=NONE          # Level 0
# edc.mock.dataProtectionLevel=BASIC         # Level 1 (encryption in transit)
# edc.mock.dataProtectionLevel=STANDARD      # Level 2 (encryption + storage)
# edc.mock.dataProtectionLevel=ENHANCED      # Level 3 (encryption + access control)
# edc.mock.dataProtectionLevel=MAXIMUM       # Level 4 (encryption + access control + audit)
# edc.mock.dataProtectionLevel=3             # Or use numeric values directly
